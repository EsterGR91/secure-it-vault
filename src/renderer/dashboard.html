<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Secure IT Vault - Dashboard</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ================= GENERAL ================= */
body{
  margin:0;
  font-family:Segoe UI;
  background:#0f172a;
  color:white;
  display:flex;
}

/* ================= SIDEBAR ================= */
.sidebar{
  width:240px;
  background:#020617;
  padding:20px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

/* LOGO */
.logo-container{
  display:flex;
  justify-content:center;
  align-items:center;
  margin:20px 0 30px 0;
}

.logo-container img{
  height:80px;
  width:auto;
  opacity:0.95;
  object-fit:contain;
}

/* BOTONES */
.nav-btn{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  background:#1e293b;
  border:none;
  color:white;
  border-radius:10px;
  cursor:pointer;
  text-align:left;
  display:flex;
  align-items:center;
  gap:10px;
  transition:0.2s;
  font-size:14px;
}

.nav-btn:hover{
  background:#334155;
}

/* LOGOUT */
.logout{
  background:#ef4444;
}

/* ================= MAIN ================= */
.main{
  flex:1;
  padding:30px 40px;
}

/* ================= HEADER ================= */
.header{
  margin-bottom:30px;
  border-bottom:1px solid rgba(255,255,255,0.05);
  padding-bottom:15px;
}

.header-left h1{
  margin:0;
}

.header-left p{
  margin:0;
  color:#94a3b8;
  font-size:14px;
}

/* ================= GRID ================= */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(260px,1fr));
  gap:25px;
}

/* ================= CARDS ================= */
.card{
  background:#020617;
  padding:25px;
  border-radius:16px;
  text-align:center;
  transition:0.2s;
  box-shadow:0 0 10px rgba(0,0,0,0.3);
}

.card:hover{
  background:#1e293b;
  transform:translateY(-5px);
}

.card i{
  font-size:38px;
  margin-bottom:10px;
  color:#38bdf8;
}

.card button{
  margin-top:12px;
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:#38bdf8;
  color:white;
  cursor:pointer;
  transition:0.2s;
  font-size:14px;
}

.card button:hover{
  background:#0ea5e9;
}

</style>

</head>

<body>

<!-- ================= SIDEBAR ================= -->
<div class="sidebar">

  <div>

    <!-- LOGO -->
    <div class="logo-container">
      <img src="assets/logo.jpeg" alt="Logo">
    </div>

    <!-- MENÚ -->
    <button class="nav-btn" onclick="goTo('dashboard')">
      <i class="fa-solid fa-house"></i> Dashboard
    </button>

    <button class="nav-btn" onclick="goTo('users')">
      <i class="fa-solid fa-users"></i> Users
    </button>

    <button class="nav-btn" onclick="goTo('vaults')">
      <i class="fa-solid fa-lock"></i> Vaults
    </button>

    <button class="nav-btn" onclick="goTo('credentials')">
      <i class="fa-solid fa-key"></i> Credentials
    </button>

    <button class="nav-btn" onclick="goTo('folders')">
      <i class="fa-solid fa-folder"></i> Folders
    </button>

    <button class="nav-btn" onclick="goTo('documents')">
      <i class="fa-solid fa-file"></i> Documents
    </button>

    <button class="nav-btn" onclick="goTo('audit')">
      <i class="fa-solid fa-clipboard"></i> Audit Logs
    </button>

  </div>

  <!-- LOGOUT -->
  <button class="nav-btn logout" onclick="logout()">
    <i class="fa-solid fa-right-from-bracket"></i> Cerrar sesión
  </button>

</div>

<!-- ================= MAIN ================= -->
<div class="main">

  <div class="header">
    <div class="header-left">
      <h1>Dashboard</h1>
      <p>Bienvenido al sistema Secure IT Vault</p>
    </div>
  </div>

  <!-- CARDS -->
  <div class="grid">

    <div class="card">
      <i class="fa-solid fa-users"></i>
      <h3>Usuarios</h3>
      <button onclick="goTo('users')">Ingresar</button>
    </div>

    <div class="card">
      <i class="fa-solid fa-lock"></i>
      <h3>Vaults</h3>
      <button onclick="goTo('vaults')">Ingresar</button>
    </div>

    <div class="card">
      <i class="fa-solid fa-key"></i>
      <h3>Credenciales</h3>
      <button onclick="goTo('credentials')">Ingresar</button>
    </div>

    <div class="card">
      <i class="fa-solid fa-folder"></i>
      <h3>Folders</h3>
      <button onclick="goTo('folders')">Ingresar</button>
    </div>

    <div class="card">
      <i class="fa-solid fa-file"></i>
      <h3>Documentos</h3>
      <button onclick="goTo('documents')">Ingresar</button>
    </div>

    <div class="card">
      <i class="fa-solid fa-clipboard"></i>
      <h3>Auditoría</h3>
      <button onclick="goTo('audit')">Ingresar</button>
    </div>

  </div>

</div>

<script>

function goTo(module){
  window.location.href = module + ".html";
}

function logout(){
  localStorage.removeItem("user");
  window.location.href = "login.html";
}

</script>

<script>

/**
 /**
 * =====================================================
 * CONTROL DE ROLES (USANDO BD REAL)
 * =====================================================
 */

document.addEventListener("DOMContentLoaded", () => {

  console.log("SCRIPT DE ROLES ACTIVADO");

  let user = JSON.parse(localStorage.getItem("user"));

  console.log("USER FINAL:", user);

  // Validación básica
  if (!user) return;

  if (user.role === "user") {
     
    console.log("APLICANDO RESTRICCIONES");

    // SIDEBAR
    document.querySelectorAll(".nav-btn").forEach(btn => {

      const text = btn.innerText.toLowerCase();

      if (!text.includes("credentials")) {
        btn.style.display = "none";
      }

    });

    // CARDS
    document.querySelectorAll(".card").forEach(card => {

      const text = card.innerText.toLowerCase();

      if (!text.includes("credenciales") && !text.includes("credentials")) {
        card.style.display = "none";
      }

    });

  }

});

</script>

</body>
</html>
