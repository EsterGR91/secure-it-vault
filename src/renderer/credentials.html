<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Credentials</title>

<style>

/* =========================
   ESTILO GENERAL
========================= */
body{
  margin:0;
  font-family:'Segoe UI';
  background:#0f172a;
  color:white;
  padding:30px;
}

/* =========================
   HEADER
========================= */
.header-center{
  text-align:center;
}

.header-center img{
  width:140px;
  margin-bottom:15px;
}

/* =========================
   BOTONES SUPERIORES
========================= */
.top-actions{
  position:absolute;
  top:20px;
  right:20px;
  display:flex;
  gap:10px;
}

.btn{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
  transition:0.2s;
}

.btn:hover{
  opacity:0.8;
}

.btn-back{background:#64748b;color:white;}
.btn-exit{background:#ef4444;color:white;}
.btn-create{background:#22c55e;color:white;}
.btn-clear{background:#475569;color:white;}

/* =========================
   FORMULARIO
========================= */
.form{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:center;
  align-items:center;
}

input{
  padding:12px;
  border:none;
  border-radius:10px;
  background:#1e293b;
  color:white;
  min-width:150px;
}

/* =========================
   BUSCADOR
========================= */
.search-box{
  margin:20px auto;
  width:300px;
}

.search-box input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  background:#1e293b;
  color:white;
}

/* =========================
   GRID
========================= */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:15px;
  margin-top:25px;
}

/* =========================
   TARJETAS
========================= */
.card{
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  box-shadow:0 0 10px rgba(0,0,0,0.4);
}

/* animación suave */
.fade-in{
  animation: fade 0.2s ease;
}

@keyframes fade{
  from{opacity:0; transform:translateY(5px);}
  to{opacity:1;}
}

.title{
  font-weight:bold;
  font-size:15px;
}

/* =========================
   BOTONES TARJETA
========================= */
.actions{
  margin-top:10px;
  display:flex;
  gap:10px;
}

.actions button{
  border:none;
  border-radius:8px;
  padding:6px 12px;
  cursor:pointer;
  font-size:12px;
  font-weight:600;
}

.actions button:nth-child(1){background:#3b82f6;color:white;}
.actions button:nth-child(2){background:#10b981;color:white;}
.actions button:nth-child(3){background:#f59e0b;color:white;}
.actions button:nth-child(4){background:#ef4444;color:white;}

/* =========================
   MODAL
========================= */
.modal-overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  display:flex;
  justify-content:center;
  align-items:center;
}

.modal-box{
  background:#1e293b;
  padding:25px;
  border-radius:12px;
  width:350px;
}

/* =========================
   TOAST
========================= */
.toast{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#22c55e;
  padding:12px 20px;
  border-radius:10px;
  font-weight:bold;
  box-shadow:0 0 10px rgba(0,0,0,0.4);
}

</style>
</head>

<body>

<!-- =========================
     BOTONES SUPERIORES
========================= -->
<div class="top-actions">
  <button class="btn btn-back" onclick="goBack()">Volver</button>
  <button class="btn btn-exit" onclick="exitApp()">Salir</button>
</div>

<!-- =========================
     HEADER
========================= -->
<div class="header-center">
  <img src="./assets/logo.jpeg">
  <h2>Credentials</h2>
</div>

<!-- =========================
     FORMULARIO
========================= -->
<div class="form">

  <!-- sistema -->
  <input id="title" placeholder="Sistema / App">

  <!-- usuario -->
  <input id="username" placeholder="Usuario">

  <!-- password con toggle -->
  <input id="password" type="password" placeholder="Password">
  <button class="btn btn-clear" onclick="togglePassword()">👁</button>

  <!-- url -->
  <input id="url" placeholder="URL">

  <!-- acciones -->
  <button class="btn btn-create" onclick="createCredential()">Guardar</button>
  <button class="btn btn-clear" onclick="generatePassword()">Generar</button>
  <button class="btn btn-clear" onclick="clearForm()">Limpiar</button>

</div>

<!-- GENERADOR VISUAL -->
<div style="margin-top:30px; text-align:center;">

  <!-- slider -->
  <input type="range" id="length" min="12" max="32" value="16" oninput="updateLength()">
  <span id="lengthLabel">16</span> caracteres

  <br><br>

  <!-- caja verde -->
  <div id="generatedPass" style="
    background:#22c55e;
    padding:14px;
    border-radius:10px;
    font-weight:bold;
    letter-spacing:2px;
    min-width:320px;
    display:inline-block;
  ">
    contraseña aquí
  </div>

  <br><br>

  <button class="btn btn-create" onclick="generatePasswordAdvanced()">Generar fuerte</button>
  <button class="btn btn-clear" onclick="copyGenerated()">Copiar</button>

</div>


<!-- =========================
     BUSCADOR
========================= -->
<div class="search-box">
  <input id="search" placeholder="Buscar..." onkeyup="filterCredentials()">
</div>

<!-- =========================
     LISTADO
========================= -->
<div id="list" class="grid"></div>

<!-- =========================
     SCRIPT
========================= -->
<script src="credentials.js"></script>

</body>
</html>
