<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Credentials</title>

<style>

/* =========================
   ESTILO GENERAL
========================= */
body{
  margin:0;
  font-family:'Segoe UI';
  background:#0f172a;
  color:white;
  padding:30px;
}

/* =========================
   HEADER
========================= */
.header-center{
  text-align:center;
}

.header-center img{
  width:140px;
  margin-bottom:15px;
}

/* =========================
   BOTONES SUPERIORES
========================= */
.top-actions{
  position:absolute;
  top:20px;
  right:20px;
  display:flex;
  gap:10px;
}

.btn{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
  transition:0.2s;
}

.btn:hover{
  opacity:0.8;
}

.btn-back{background:#64748b;color:white;}
.btn-exit{background:#ef4444;color:white;}
.btn-create{background:#22c55e;color:white;}
.btn-clear{background:#475569;color:white;}

/* =========================
   FORMULARIO
========================= */
.form{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:center;
  align-items:center;
}

input{
  padding:12px;
  border:none;
  border-radius:10px;
  background:#1e293b;
  color:white;
  min-width:150px;
}

/* =========================
   BUSCADOR
========================= */
.search-box{
  margin:20px auto;
  width:300px;
}

.search-box input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  background:#1e293b;
  color:white;
}

/* =========================
   GRID
========================= */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:15px;
  margin-top:25px;
}

/* =========================
   TARJETAS
========================= */
.card{
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  box-shadow:0 0 10px rgba(0,0,0,0.4);
}

.title{
  font-weight:bold;
  font-size:15px;
}

/* =========================
   BOTONES TARJETA
========================= */
.actions{
  margin-top:10px;
  display:flex;
  gap:10px;
}

.actions button{
  border:none;
  border-radius:8px;
  padding:6px 12px;
  cursor:pointer;
  font-size:12px;
  font-weight:600;
}

.actions button:nth-child(1){background:#3b82f6;color:white;}
.actions button:nth-child(2){background:#10b981;color:white;}
.actions button:nth-child(3){background:#f59e0b;color:white;}
.actions button:nth-child(4){background:#ef4444;color:white;}

</style>
</head>

<body>

<div class="top-actions">
  <button class="btn btn-back" onclick="goBack()">Volver</button>
  <button class="btn btn-exit" onclick="exitApp()">Salir</button>
</div>

<div class="header-center">
  <img src="./assets/logo.jpeg">
  <h2>Credentials</h2>
</div>

<div class="form">
  <input id="title" placeholder="Sistema / App">
  <input id="username" placeholder="Usuario">

  <!-- password con mostrar/ocultar -->
  <input id="password" type="password" placeholder="Password">
  <button class="btn btn-clear" onclick="togglePassword()">👁</button>

  <input id="url" placeholder="URL">

  <button class="btn btn-create" onclick="createCredential()">Guardar</button>
  <button class="btn btn-clear" onclick="generatePassword()">Generar</button>
  <button class="btn btn-clear" onclick="clearForm()">Limpiar</button>
</div>

<div class="search-box">
  <input id="search" placeholder="Buscar..." onkeyup="filterCredentials()">
</div>

<div id="list" class="grid"></div>

<script src="credentials.js"></script>

</body>
</html>
