<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Credentials</title>

<style>

/* =========================
   ESTILO GENERAL
========================= */

body{
  margin:0;
  font-family:'Segoe UI';
  background:#0f172a;
  color:white;
  padding:30px;
}

/* =========================
   HEADER
========================= */

.header-center{
  text-align:center;
}

.header-center img{
  width:140px;
  margin-bottom:15px;
}

/* =========================
   BOTONES SUPERIORES
========================= */

.top-actions{
  position:absolute;
  top:20px;
  right:20px;
  display:flex;
  gap:10px;
}

.btn-back{background:#64748b;color:white;}
.btn-exit{background:#ef4444;color:white;}

/* =========================
   FORMULARIO
========================= */

.form{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:center;
}

input{
  padding:12px;
  border:none;
  border-radius:10px;
  background:#1e293b;
  color:white;
}

/* =========================
   BOTONES
========================= */

.btn{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.btn-create{background:#22c55e;}
.btn-clear{background:#475569;}

/* =========================
   BUSCADOR
========================= */

.search-box{
  margin:20px auto;
  width:300px;
}

.search-box input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  background:#1e293b;
  color:white;
}

/* =========================
   GRID
========================= */

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
  margin-top:25px;
}

/* =========================
   TARJETAS
========================= */

.card{
  background:#1e293b;
  padding:15px;
  border-radius:12px;
}

.title{
  font-weight:bold;
}

.actions{
  margin-top:10px;
  display:flex;
  gap:10px;
}

</style>
</head>

<body>

<!-- BOTONES SUPERIORES -->
<div class="top-actions">
  <button class="btn btn-back" onclick="goBack()">Volver</button>
  <button class="btn btn-exit" onclick="exitApp()">Salir</button>
</div>

<!-- HEADER -->
<div class="header-center">
  <img src="./assets/logo.jpeg">
  <h2>Credentials</h2>
</div>

<!-- FORMULARIO -->
<div class="form">
  <input id="title" placeholder="Sistema / App">
  <input id="username" placeholder="Usuario">
  <input id="password" placeholder="Password">
  <input id="url" placeholder="URL">

  <button class="btn btn-create" onclick="createCredential()">Guardar</button>
  <button class="btn btn-clear" onclick="generatePassword()">Generar</button>
  <button class="btn btn-clear" onclick="clearForm()">Limpiar</button>
</div>

<!-- BUSCADOR -->
<div class="search-box">
  <input id="search" placeholder="Buscar..." onkeyup="filterCredentials()">
</div>

<!-- LISTA -->
<div id="list" class="grid"></div>

<script src="credentials.js"></script>

</body>
</html>
