<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<!-- Permite el uso de caracteres especiales -->

<title>Audit Logs</title>
<!-- Módulo de visualización de auditoría del sistema -->

<style>

/* =========================
   ESTILO GENERAL
========================= */

body{
  margin:0;
  font-family:'Segoe UI';
  background:#0f172a;
  color:white;
  padding:30px;
}

/* =========================
   HEADER
========================= */

.header-center{
  text-align:center;
}

.header-center img{
  width:140px;
  margin-bottom:15px;
}

/* =========================
   BOTONES SUPERIORES
========================= */

.top-actions{
  position:absolute;
  top:20px;
  right:20px;
  display:flex;
  gap:10px;
}

.btn{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
  transition:0.2s;
}

.btn:hover{
  opacity:0.8;
}

.btn-back{background:#64748b;color:white;}
.btn-clear{background:#475569;color:white;}
.btn-exit{background:#ef4444;color:white;}
.btn-export{background:#22c55e;color:white;} /* Botón exportar */

/* =========================
   FILTROS
========================= */

.filters{
  display:flex;
  justify-content:center;
  margin-top:10px;
}

select{
  padding:10px;
  border-radius:10px;
  border:none;
  background:#1e293b;
  color:white;
}

/* =========================
   BUSCADOR
========================= */

.search-box{
  margin:15px auto;
  width:300px;
}

.search-box input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  background:#1e293b;
  color:white;
}

/* =========================
   TABLA
========================= */

table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
}

th,td{
  padding:10px;
  text-align:left;
}

tr{
  background:#1e293b;
  border-bottom:1px solid rgba(255,255,255,0.05);
  transition:0.2s;
}

tr:hover{
  background:#334155;
}

/* =========================
   BADGE USER
========================= */

.badge-user{
  padding:4px 10px;
  border-radius:8px;
  font-size:12px;
  font-weight:600;
  background:#22c55e;
}

.badge-system{
  background:#64748b;
}

/* =========================
   COLORES POR ACCIÓN
========================= */

.action-create{color:#22c55e;font-weight:bold;}
.action-update{color:#3b82f6;font-weight:bold;}
.action-delete{color:#ef4444;font-weight:bold;}

/* =========================
   PAGINACIÓN
========================= */

.pagination{
  display:flex;
  justify-content:center;
  margin-top:20px;
  gap:5px;
}

.page-btn{
  background:#1e293b;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
}

.page-btn:hover{
  background:#334155;
}

.active{
  background:#22c55e;
}

/* =========================
   GRÁFICO
========================= */

canvas{
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  box-shadow:0 0 10px rgba(0,0,0,0.4);
  margin-top:30px;
}

</style>
</head>

<body>

<!-- =========================
     BOTONES SUPERIORES
========================= -->

<div class="top-actions">
  <button class="btn btn-back" onclick="goBack()">Volver</button>
  <button class="btn btn-clear" onclick="clearSearch()">Limpiar</button>
  <button class="btn btn-export" onclick="exportCSV()">Exportar</button>
  <button class="btn btn-exit" onclick="exitApp()">Salir</button>
</div>

<!-- =========================
     HEADER
========================= -->

<div class="header-center">
  <img src="./assets/logo.jpeg">
  <h2>Audit Logs</h2>
</div>

<!-- =========================
     FILTRO POR ACCIÓN
========================= -->

<div class="filters">
  <select id="filterAction" onchange="applyFilters()">
    <option value="">Todas</option>
    <option value="CREATE">CREATE</option>
    <option value="UPDATE">UPDATE</option>
    <option value="DELETE">DELETE</option>
  </select>
</div>

<!-- =========================
     BUSCADOR
========================= -->

<div class="search-box">
  <input id="search" placeholder="Buscar..." onkeyup="applyFilters()">
</div>

<!-- =========================
     TABLA
========================= -->

<table>
<thead>
<tr>
<th>User</th>
<th>Action</th>
<th>Target</th>
<th>IP</th>
<th>Fecha</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

<!-- =========================
     PAGINACIÓN
========================= -->

<div class="pagination" id="pagination"></div>

<!-- =========================
     GRÁFICO
========================= -->

<canvas id="chart" height="100"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="audit.js"></script>

</body>
</html>
