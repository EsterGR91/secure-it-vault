<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Secure IT Vault - Login</title>

  <style>
    /* =====================================================
       CONFIGURACIÓN GLOBAL
       ===================================================== */

    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0f172a;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    /* =====================================================
       CONTENEDOR PRINCIPAL DEL LOGIN
       ===================================================== */

    .login-box {
      width: 360px;
      padding: 40px;
      background: #020617;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 0 40px rgba(0,195,255,0.15);
    }

    /* =====================================================
       LOGO SUPERIOR
       ===================================================== */

    .logo {
      width: 180px;      /* Tamaño controlado del logo */
      margin-bottom: 20px;
    }

    h2 {
      color: #38bdf8;
      margin-bottom: 25px;
    }

    /* =====================================================
       INPUTS
       ===================================================== */

    .input-container {
      position: relative;
      width: 100%;
      margin-top: 14px;
    }

    input {
      width: 100%;
      padding: 12px;
      background: #1e293b;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 14px;
      outline: none;

      -webkit-appearance: none;
      appearance: none;
    }

    input:focus {
      box-shadow: 0 0 0 2px #00c6ff;
    }

    /* Elimina iconos internos de Chromium */
    input::-ms-reveal,
    input::-ms-clear {
      display: none;
    }

    input::-webkit-credentials-auto-fill-button,
    input::-webkit-password-toggle-button {
      display: none !important;
      visibility: hidden;
      pointer-events: none;
    }

    /* =====================================================
       OJITO PERSONALIZADO
       ===================================================== */

    .toggle-password {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 16px;
      color: #94a3b8;
      user-select: none;
    }

    .toggle-password:hover {
      color: #38bdf8;
    }

    /* =====================================================
       BOTÓN LOGIN
       ===================================================== */

    .login-btn {
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      background: linear-gradient(90deg, #1f8ef1, #00c6ff);
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      font-size: 15px;
    }

    .login-btn:hover {
      opacity: 0.9;
    }

    .forgot {
      margin-top: 15px;
      font-size: 13px;
      color: #38bdf8;
      cursor: pointer;
    }

    .forgot:hover {
      text-decoration: underline;
    }

    .error {
      color: #f87171;
      margin-top: 10px;
      font-size: 13px;
    }

  </style>
</head>

<body>

  <div class="login-box">

    <!-- =====================================================
         LOGO INSTITUCIONAL
         Representa la identidad corporativa del sistema
         ===================================================== -->

<img src="assets/logo.jpeg" alt="East West Logo" class="logo">

    <h2>IT Vault Access</h2>

    <!-- =========================
         CAMPO USUARIO
         ========================= -->

    <div class="input-container">
      <input id="username"
             type="text"
             placeholder="Usuario"
             autocomplete="off" />
    </div>

    <!-- =========================
         CAMPO CONTRASEÑA
         ========================= -->

    <div class="input-container">
      <input id="password"
             type="password"
             placeholder="Contraseña"
             autocomplete="off" />

      <span class="toggle-password" onclick="togglePassword()">👁</span>
    </div>

    <!-- BOTÓN LOGIN -->
    <button class="login-btn" onclick="login()">Ingresar</button>

    <!-- RECUPERACIÓN -->
    <div class="forgot" onclick="forgotPassword()">
      ¿Olvidé mi contraseña?
    </div>

    <div id="error" class="error"></div>

  </div>

  <!-- Script toggle -->
  <script>
    function togglePassword() {
      const passwordInput = document.getElementById("password");
      passwordInput.type =
        passwordInput.type === "password" ? "text" : "password";
    }
  </script>

  <script src="login.js"></script>

</body>
</html>
