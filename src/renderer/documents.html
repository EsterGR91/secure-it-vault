<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Documents</title>

<style>

/* =========================
   ESTILO GENERAL
========================= */
body{
  margin:0;
  font-family:'Segoe UI';
  background:#0f172a;
  color:white;
  padding:30px;
}

/* =========================
   HEADER
========================= */
.header-center{
  text-align:center;
}

.header-center img{
  width:140px;
  margin-bottom:15px;
}

/* =========================
   BOTONES SUPERIORES
========================= */
.top-actions{
  position:absolute;
  top:20px;
  right:20px;
  display:flex;
  gap:10px;
}

/* =========================
   BOTONES GENERALES
========================= */
.btn{
  padding:10px 16px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
  transition:all 0.2s ease;
  box-shadow:0 2px 6px rgba(0,0,0,0.3);
}

.btn:hover{
  transform:translateY(-2px);
  box-shadow:0 6px 12px rgba(0,0,0,0.4);
}

/* COLORES */
.btn-upload{background:#22c55e;color:white;}
.btn-back{background:#64748b;color:white;}
.btn-exit{background:#ef4444;color:white;}

/* =========================
   FORMULARIO
========================= */
.upload-box{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:20px;
  flex-wrap:wrap;
}

input{
  padding:12px;
  border:none;
  border-radius:10px;
  background:#1e293b;
  color:white;
}

/* =========================
   BUSCADOR
========================= */
.search-box{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:15px;
}

.search-box input{
  width:250px;
}

/* =========================
   GRID DOCUMENTOS
========================= */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
  margin-top:30px;
}

/* =========================
   CARD
========================= */
.card{
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  box-shadow:0 0 10px rgba(0,0,0,0.4);
}

.title{
  font-weight:bold;
}

.date{
  font-size:12px;
  color:#94a3b8;
  margin-top:5px;
}

/* =========================
   BOTONES CARD
========================= */
.actions{
  margin-top:10px;
  display:flex;
  gap:10px;
}

.actions button{
  border:none;
  border-radius:8px;
  padding:6px 14px;
  cursor:pointer;
  font-size:12px;
  transition:0.2s;
}

.actions button:nth-child(1){
  background:#3b82f6;
  color:white;
}

.actions button:nth-child(2){
  background:#ef4444;
  color:white;
}

.actions button:hover{
  transform:scale(1.05);
}

.actions button:nth-child(2){
  background:#10b981;
  color:white;
}

</style>
</head>

<body>

<!-- BOTONES SUPERIORES -->
<div class="top-actions">
  <button class="btn btn-back" onclick="goBack()">Volver</button>
  <button class="btn btn-exit" onclick="exitApp()">Salir</button>
</div>

<!-- HEADER -->
<div class="header-center">
  <img src="./assets/logo.jpeg">
  <h2>Documents</h2>
</div>

<!-- SUBIDA -->
<div class="upload-box">

  <input type="file" id="file">
  <input id="title" placeholder="Nombre del documento">

  <button class="btn btn-upload" onclick="upload()">
    Subir
  </button>

</div>

<!-- BUSCADOR (AHORA BIEN UBICADO) -->
<div class="search-box">

  <input 
    id="search"
    placeholder="Buscar documento..."
    oninput="filterDocs()"
  >

  <button class="btn btn-back" onclick="clearSearch()">
    Limpiar
  </button>

</div>

<!-- LISTA -->
<div id="list" class="grid"></div>

<script src="documents.js"></script>

</body>
</html>
