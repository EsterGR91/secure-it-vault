<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Users</title>

<style>

/* ===== GENERAL ===== */
body{
  margin:0;
  font-family:'Segoe UI';
  background: linear-gradient(135deg,#0f172a,#020617);
  color:white;
  padding:30px;
}

/* ===== HEADER ===== */
.header-center{text-align:center;}
.header-center img{width:140px;margin-bottom:15px;}
h2{margin-bottom:20px;}

/* ===== BOTONES SUPERIORES ===== */
.top-actions{
  position:absolute;
  top:20px;
  right:20px;
}

.btn{
  padding:10px 16px;
  border-radius:10px;
  border:none;
  cursor:pointer;
  font-weight:600;
  transition:0.2s;
}

.btn:hover{transform:scale(1.05);}

.btn-back{background:#64748b;color:white;}
.btn-logout{background:#ef4444;color:white;}

/* ===== FORM ===== */
.form{
  display:flex;
  gap:10px;
  justify-content:center;
  flex-wrap:wrap;
}

/* INPUT CON ICONO 👁 */
.input-group{position:relative;}

.input-group input{
  padding:12px;
  border-radius:10px;
  border:none;
  background:#1e293b;
  color:white;
  padding-right:40px;
}

.eye-icon{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
}

/* BOTONES */
.btn-create{
  background:#22c55e;
}

.btn-clear{
  background:#475569;
}

/* ===== BUSCADOR ===== */
.search-box{
  position:relative;
  width:250px;
  margin:20px auto;
}

.search-box input{
  width:100%;
  padding:12px 12px 12px 40px;
  border-radius:10px;
  border:none;
  background:#1e293b;
  color:white;
}

.search-box .icon{
  position:absolute;
  left:12px;
  top:50%;
  transform:translateY(-50%);
}

/* ===== TABLA ===== */
table{width:100%;margin-top:20px;}
td,th{padding:12px;}

.actions{display:flex;gap:10px;}

.btn-edit{
  background:#facc15;
  padding:6px 12px;
  border-radius:8px;
}

.btn-delete{
  background:#ef4444;
  padding:6px 12px;
  border-radius:8px;
}

/* ===== MODAL PRO  ===== */
.edit-modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.7);
  z-index:9999;
}

.edit-content{
  background:#1e293b;
  padding:30px;
  border-radius:15px;
  width:350px;
}

.edit-content input,select{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  background:#0f172a;
  color:white;
}

.modal-actions{
  display:flex;
  gap:10px;
  margin-top:15px;
}

.save-btn{background:#22c55e;}
.cancel-btn{background:#ef4444;}

</style>

</head>

<body>

<!-- BOTONES -->
<div class="top-actions">
  <button class="btn btn-back" onclick="goBack()">⬅</button>
  <button class="btn btn-logout" onclick="logout()">Salir</button>
</div>

<!-- HEADER -->
<div class="header-center">
  <img src="./assets/logo.jpeg">
  <h2>Usuarios</h2>
</div>

<!-- FORM -->
<div class="form">

  <input id="username" placeholder="Username">
  <input id="email" placeholder="Email">

  <div class="input-group">
    <input id="password" type="password" placeholder="Password">
    <span class="eye-icon" onclick="togglePassword('password')">👁</span>
  </div>

  <div class="input-group">
    <input id="confirmPassword" type="password" placeholder="Repeat Password">
    <span class="eye-icon" onclick="togglePassword('confirmPassword')">👁</span>
  </div>

  <button class="btn btn-create" onclick="createUser()">Crear</button>
  <button class="btn btn-clear" onclick="clearForm()">Limpiar</button>

</div>

<!-- BUSCADOR -->
<div class="search-box">
  <span class="icon">🔍</span>
  <input id="search" placeholder="Buscar..." onkeyup="filterUsers()">
</div>

<!-- TABLA -->
<table>
<thead>
<tr>
<th>ID</th>
<th>Username</th>
<th>Email</th>
<th>Role</th>
<th>Acciones</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<!-- MODAL -->
<div id="editBox" class="edit-modal">
  <div class="edit-content">

    <h3>Editar usuario</h3>

    <input id="editUsername">
    <input id="editEmail">

    <select id="editRole">
      <option value="admin">Admin</option>
      <option value="user">User</option>
    </select>

    <div class="input-group">
      <input id="editPassword" type="password" placeholder="Nueva contraseña">
      <span class="eye-icon" onclick="togglePassword('editPassword')">👁</span>
    </div>

    <div class="input-group">
      <input id="editConfirm" type="password" placeholder="Repetir contraseña">
      <span class="eye-icon" onclick="togglePassword('editConfirm')">👁</span>
    </div>

    <div class="modal-actions">
      <button class="btn save-btn" onclick="saveEdit()">Guardar</button>
      <button class="btn cancel-btn" onclick="cancelEdit()">Cancelar</button>
    </div>

  </div>
</div>

<script src="users.js"></script>

<script>

/* 👁 TOGGLE PASSWORD */
function togglePassword(id){
  const input = document.getElementById(id);
  input.type = input.type === "password" ? "text" : "password";
}

/* NAV */
function goBack(){
  window.location.href="dashboard.html";
}

function logout(){
  localStorage.clear();
  window.location.href="login.html";
}

</script>

</body>
</html>
