<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Folders</title>

<style>

/* =========================================================
   GENERAL
========================================================= */

body{
  margin:0;
  font-family:'Segoe UI';
  background:#0f172a;
  color:white;
  padding:20px;
}

/* =========================================================
   LOGO (IGUAL DASHBOARD)
========================================================= */

.logo{
  text-align:center;
  margin-bottom:10px;
}

.logo img{
  width:160px;
}

/* =========================================================
   BOTONES SUPERIORES
========================================================= */

.top-actions{
  position:absolute;
  top:15px;
  right:20px;
  display:flex;
  gap:10px;
}

.btn{
  padding:8px 14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:500;
  transition:0.2s;
}

.btn-back{background:#64748b;}
.btn-exit{background:#ef4444;}
.btn-clear{background:#475569;}

.btn:hover{
  transform:translateY(-1px);
  opacity:0.9;
}

/* =========================================================
   HEADER
========================================================= */

.header{
  text-align:center;
}

/* =========================================================
   CONTROLES
========================================================= */

.controls{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:10px;
}

select,input{
  padding:10px;
  border-radius:10px;
  border:none;
  background:#1e293b;
  color:white;
}

/* =========================================================
   TREE
========================================================= */

.tree{margin-top:20px;}

.node{
  display:flex;
  align-items:center;
  gap:8px;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
  transition:0.2s;
}

.node:hover{background:#1e293b;}

.arrow{
  width:15px;
  transition:0.2s;
}

.arrow.open{
  transform:rotate(90deg);
}

.children{
  margin-left:20px;
  max-height:0;
  overflow:hidden;
  transition:max-height 0.3s ease;
}

.children.show{
  max-height:500px;
}

/* =========================================================
   ICONOS PRO (SIN EMOJIS)
========================================================= */

.icon{
  width:12px;
  height:12px;
  border-radius:2px;
}

.icon-vault{
  background:linear-gradient(135deg,#3b82f6,#6366f1);
}

.icon-folder{
  background:#facc15;
}

/* =========================================================
   MENÚ ⋮
========================================================= */

.menu{
  margin-left:auto;
  cursor:pointer;
  padding:4px 6px;
  border-radius:6px;
  transition:0.2s;
  opacity:0.6;
}

.menu:hover{
  background:#334155;
  opacity:1;
}

/* =========================================================
   EDITOR INLINE
========================================================= */

.editor{
  margin-left:40px;
  margin-top:5px;
  display:flex;
  gap:5px;
}

/* Inputs */
.editor input{
  background:#020617;
  border:1px solid rgba(255,255,255,0.1);
  border-radius:6px;
  padding:6px;
  color:white;
  font-size:12px;
}

/* Botones pro */
.btn-mini{
  padding:5px 10px;
  border:none;
  border-radius:6px;
  font-size:11px;
  cursor:pointer;
  transition:0.2s;
}

/* Guardar */
.btn-save{
  background:linear-gradient(135deg,#22c55e,#16a34a);
}

/* Eliminar */
.btn-delete{
  background:linear-gradient(135deg,#ef4444,#dc2626);
}

.btn-mini:hover{
  transform:scale(1.05);
}

/* =========================
   EDITOR DE NOTAS EXPANDIBLE
========================= */

.notes-area{
  width:100%;
  min-height:60px;
  max-height:300px;
  resize:vertical;

  background:#0f172a;
  color:white;

  border:1px solid rgba(255,255,255,0.1);
  border-radius:8px;

  padding:8px;
  margin-top:5px;

  font-family:'Segoe UI';
  font-size:13px;

  outline:none;
}

/* efecto focus bonito */
.notes-area:focus{
  border:1px solid #22c55e;
  box-shadow:0 0 5px rgba(34,197,94,0.4);
}


</style>
</head>

<body>

<!-- LOGO -->
<div class="logo">
  <img src="./assets/logo.jpeg">
</div>

<!-- BOTONES -->
<div class="top-actions">
  <button class="btn btn-back" onclick="goBack()">Volver</button>
  <button class="btn btn-exit" onclick="exitApp()">Salir</button>
</div>

<!-- HEADER -->
<div class="header">
  <h2>Folders</h2>
</div>

<!-- CONTROLES -->
<div class="controls">
  <select id="vaultSelect" onchange="loadFolders()"></select>
  <input id="search" placeholder="Buscar..." onkeyup="filterFolders()">
  <button class="btn btn-clear" onclick="clearSearch()">Limpiar</button>
</div>

<!-- TREE -->
<div id="tree" class="tree"></div>

<script src="folders.js"></script>

</body>
</html>
