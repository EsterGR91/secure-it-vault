<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vaults</title>

<style>

/* ===============================
   ESTILO GENERAL
=============================== */
body{
  margin:0;
  font-family:'Segoe UI';
  background:#0f172a;
  color:white;
  padding:30px;
}

/* ===============================
   HEADER
=============================== */
.header-center{text-align:center;}
.header-center img{width:140px;margin-bottom:15px;}
h2{margin-bottom:20px;}

/* ===============================
   BOTONES SUPERIORES
=============================== */
.top-actions{
  position:absolute;
  top:20px;
  right:20px;
}

.btn{
  padding:10px 16px;
  border-radius:10px;
  border:none;
  cursor:pointer;
  font-weight:600;
  transition:0.2s;
}

.btn:hover{transform:scale(1.05);}

.btn-back{background:#64748b;color:white;}
.btn-logout{background:#ef4444;color:white;}
.btn-create{background:#22c55e;color:white;}
.btn-clear{background:#475569;color:white;}

/* ===============================
   FORMULARIO
=============================== */
.form{
  display:flex;
  gap:10px;
  justify-content:center;
  flex-wrap:wrap;
  margin-bottom:20px;
}

input{
  padding:12px;
  border-radius:10px;
  border:none;
  background:#1e293b;
  color:white;
}

/* ===============================
   BUSCADOR
=============================== */
.search-box{
  position:relative;
  width:250px;
  margin:20px auto;
}

.search-box input{
  width:100%;
  padding:12px 12px 12px 40px;
  border-radius:10px;
  border:none;
  background:#1e293b;
  color:white;
}

.search-box .icon{
  position:absolute;
  left:12px;
  top:50%;
  transform:translateY(-50%);
}

/* ===============================
   GRID DE VAULTS (tipo notas)
=============================== */
.vault-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
  gap:15px;
  margin-top:20px;
}

/* tarjeta */
.vault-card{
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  position:relative;
  box-shadow:0 0 10px rgba(0,0,0,0.4);
}

/* título */
.vault-title{
  font-weight:bold;
  font-size:16px;
}

/* descripción */
.vault-desc{
  font-size:13px;
  color:#94a3b8;
  margin-top:5px;
}

/* fecha */
.vault-date{
  font-size:11px;
  margin-top:10px;
  color:#64748b;
}

/* menú */
.menu{
  position:absolute;
  top:10px;
  right:10px;
  cursor:pointer;
}

/* dropdown */
.menu-options{
  position:absolute;
  top:30px;
  right:10px;
  background:#020617;
  border-radius:8px;
  display:none;
}

.menu-options button{
  display:block;
  width:100%;
  background:none;
  border:none;
  color:white;
  padding:8px;
  cursor:pointer;
}

.menu-options button:hover{
  background:#334155;
}

/* ===============================
   ESTILO PARA NOTAS DEL VAULT
=============================== */

.vault-note{
  width:100%;                 /* Ocupa todo el ancho disponible */
  min-height:80px;            /* Altura mínima para que siempre sea visible */
  margin-top:10px;            /* Separación superior respecto a otros elementos */
  background:#0f172a;         /* Fondo oscuro acorde al tema del sistema */
  border:none;                /* Sin borde por defecto */
  color:white;                /* Texto en blanco */
  resize:vertical;            /* Permite redimensionar solo verticalmente */
  padding:10px;               /* Espaciado interno más cómodo para escribir */
  border-radius:8px;          /* Bordes redondeados */
  transition:0.2s;            /* Transición suave para efectos visuales */
}

/* Estilo cuando el usuario hace foco en la nota */
.vault-note:focus{
  outline:2px solid #22c55e;   /* Resalta con borde verde cuando está activa */
  background:#020617;         /* Fondo un poco más oscuro al escribir */
}


</style>
</head>

<body>

<div class="top-actions">
  <button class="btn btn-back" onclick="goBack()">Volver</button>
  <button class="btn btn-logout" onclick="logout()">Salir</button>
</div>

<div class="header-center">
  <img src="./assets/logo.jpeg">
  <h2>Vaults</h2>
</div>

<div class="form">
  <input id="name" placeholder="Nombre del Vault">
  <input id="description" placeholder="Descripción">
  <button class="btn btn-create" onclick="createVault()">Crear</button>
  <button class="btn btn-clear" onclick="clearForm()">Limpiar</button>
</div>

<div class="search-box">
  <span class="icon">🔍</span>
  <input id="search" placeholder="Buscar..." onkeyup="filterVaults()">
</div>

<!-- CONTENEDOR NUEVO -->
<div id="vaultContainer" class="vault-grid"></div>

<script src="vaults.js"></script>

<script>
function goBack(){ window.location.href="dashboard.html"; }
function logout(){ localStorage.clear(); window.location.href="login.html"; }
</script>

</body>
</html>
