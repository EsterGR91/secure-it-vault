<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Password Recovery - Secure IT Vault</title>

<!--
=====================================================
ESTILOS DE LA PANTALLA
Uso el mismo estilo visual del login y reset password
para mantener una identidad visual consistente
en toda la aplicación.
=====================================================
-->

<style>

body{

  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;

  font-family: Arial, Helvetica, sans-serif;

  /* fondo oscuro elegante */
  background: linear-gradient(135deg,#0f1a2b,#081120);

  color:white;

}

.card{

  width:380px;
  padding:40px;

  background:#111c2e;

  border-radius:10px;

  text-align:center;

  box-shadow:0 0 25px rgba(0,0,0,0.6);

}

.logo{

  width:170px;
  margin-bottom:20px;

}

h2{

  color:#36c2ff;
  margin-bottom:10px;

}

.subtitle{

  font-size:14px;
  color:#a0b4d6;
  margin-bottom:20px;

}

input{

  width:100%;
  padding:12px;

  border:none;
  border-radius:6px;

  background:#1d2b44;
  color:white;

  margin-top:10px;

  font-size:15px;

}

input::placeholder{

  color:#a0b4d6;

}

button{

  width:100%;
  padding:12px;

  margin-top:20px;

  border:none;
  border-radius:6px;

  background:#2ec4ff;

  color:white;
  font-size:16px;
  font-weight:bold;

  cursor:pointer;

}

button:hover{

  background:#18a9e0;

}

#error{

  color:#ff5b5b;
  margin-top:12px;

}

</style>

</head>

<body>


<div class="card">

<!--
=====================================================
LOGO DEL SISTEMA
=====================================================
-->

<img src="assets/logo.jpeg" class="logo">


<!--
=====================================================
TÍTULO
=====================================================
-->

<h2>Password Recovery</h2>

<p class="subtitle">
Enter your username or email to receive a verification code
</p>


<!--
=====================================================
CAMPO DE USUARIO O EMAIL
=====================================================
-->

<input
id="userInput"
type="text"
placeholder="Username or Email">


<!--
=====================================================
BOTÓN PARA ENVIAR CÓDIGO
=====================================================
-->

<button onclick="sendRecoveryCode()">

Send Verification Code

</button>


<!--
=====================================================
MENSAJES DE ERROR
=====================================================
-->

<p id="error"></p>

</div>


<!--
=====================================================
SCRIPT DE RECUPERACIÓN
=====================================================
-->

<script src="recover-password.js"></script>


</body>
</html>
