<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Recuperación de contraseña - Secure IT Vault</title>

<style>

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family: Arial, Helvetica, sans-serif;
  background: linear-gradient(135deg,#0f1a2b,#081120);
  color:white;
}

.card{
  width:380px;
  padding:40px;
  background:#111c2e;
  border-radius:10px;
  text-align:center;
  box-shadow:0 0 25px rgba(0,0,0,0.6);
}

.logo{
  width:170px;
  margin-bottom:20px;
}

h2{
  color:#36c2ff;
  margin-bottom:10px;
}

.subtitle{
  font-size:14px;
  color:#a0b4d6;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:12px;
  border:none;
  border-radius:6px;
  background:#1d2b44;
  color:white;
  margin-top:10px;
  font-size:15px;
}

input::placeholder{
  color:#a0b4d6;
}

button{
  width:100%;
  padding:12px;
  margin-top:20px;
  border:none;
  border-radius:6px;
  background:#2ec4ff;
  color:white;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#18a9e0;
}

#error{
  color:#ff5b5b;
  margin-top:12px;
}

/* 🔹 Estilo del link */
.link{
  color:#36c2ff;
  cursor:pointer;
  font-weight:bold;
}

.link:hover{
  text-decoration: underline;
}

</style>

</head>

<body>

<div class="card">

<img src="assets/logo.jpeg" class="logo">

<h2>Recuperación de contraseña</h2>

<p class="subtitle">
Introduce tu nombre de usuario o correo electrónico para recibir un código de verificación.
</p>

<input
id="userInput"
type="text"
placeholder="Username or Email">

<button onclick="sendRecoveryCode()">
Enviar código de verificación
</button>

<!-- 🔹 BOTÓN VOLVER -->
<p style="margin-top:15px; font-size:14px;">
¿Recordaste tu contraseña?
<span class="link" onclick="goToLogin()">Volver al login</span>
</p>

<p id="error"></p>

</div>

<script src="recover-password.js"></script>

<script>
function goToLogin(){
  window.location.href = "login.html";
}
</script>

</body>
</html>
