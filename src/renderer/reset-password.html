<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Reset Password - Secure IT Vault</title>

<!-- 
=====================================================
ESTILOS GENERALES
Mantengo los mismos colores elegantes del login
para que toda la app tenga una identidad visual
consistente y profesional.
=====================================================
-->

<style>

body{

  background: linear-gradient(135deg,#0f1a2b,#081120);
  font-family: Arial, Helvetica, sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
  color:white;

}

.card{

  background:#111c2e;
  width:380px;
  padding:40px;
  border-radius:10px;
  text-align:center;
  box-shadow:0 0 25px rgba(0,0,0,0.6);

}

.logo{

  width:180px;
  margin-bottom:15px;

}

h2{

  margin-bottom:25px;
  color:#36c2ff;

}

input{

  width:100%;
  padding:12px;
  margin-top:12px;
  border:none;
  border-radius:6px;
  background:#1d2b44;
  color:white;
  font-size:15px;

}

input::placeholder{

  color:#a0b4d6;

}

button{

  width:100%;
  margin-top:20px;
  padding:12px;
  border:none;
  border-radius:6px;
  background:#2ec4ff;
  color:white;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;

}

button:hover{

  background:#18a9e0;

}

#error{

  color:#ff5b5b;
  margin-top:12px;

}

.success{

  color:#40ff9c;
}

</style>
</head>


<body>

<div class="card">

<!-- Logo del sistema -->

<img src="assets/logo.jpeg" class="logo">

<h2>Reset Password</h2>

<!-- 
=====================================================
CAMPOS DE CONTRASEÑA
El usuario debe ingresar y confirmar su nueva contraseña
=====================================================
-->

<input
id="password"
type="password"
placeholder="New Password">

<input
id="confirm"
type="password"
placeholder="Confirm Password">

<!-- BOTÓN -->

<button onclick="resetPassword()">
Update Password
</button>

<p id="error"></p>

</div>

<!-- SCRIPT -->

<script src="reset-password.js"></script>

</body>
</html>
